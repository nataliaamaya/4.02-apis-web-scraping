<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Sample Products Page</title>
  </head>
  <body>
    <h1>Products</h1>

    <p>This is a local HTML file for the M8 lab. Learners will parse it using BeautifulSoup.</p>

    <ul class="products">
      <li class="product">
        <span class="name">Notebook Stand</span>
        <span class="price" data-currency="EUR">19.99</span>
        <span class="category">Accessories</span>
      </li>
      <li class="product">
        <span class="name">Wireless Mouse</span>
        <span class="price" data-currency="EUR">24.50</span>
        <span class="category">Accessories</span>
      </li>
      <li class="product">
        <span class="name">USB-C Hub</span>
        <span class="price" data-currency="EUR">34.00</span>
        <span class="category">Adapters</span>
      </li>
      <li class="product">
        <span class="name">Mechanical Keyboard</span>
        <span class="price" data-currency="EUR">79.00</span>
        <span class="category">Peripherals</span>
      </li>
    </ul>

    <table id="shipping">
      <thead>
        <tr><th>Region</th><th>Days</th></tr>
      </thead>
      <tbody>
        <tr><td>Portugal</td><td>2</td></tr>
        <tr><td>EU</td><td>4</td></tr>
        <tr><td>International</td><td>10</td></tr>
      </tbody>
    </table>

  </body>
</html>
